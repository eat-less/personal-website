services:
  # ============================================
  # MySQL 数据库服务
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-ershou}
      MYSQL_USER: ${DB_USER:-ershou}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ============================================
  # Django 后端服务
  # ============================================
  backend:
    build:
      context: ./ershou
      dockerfile: Dockerfile
    container_name: campus-backend
    restart: unless-stopped
    environment:
      # Django 核心配置
      SECRET_KEY: ${SECRET_KEY:-django-insecure-docker-change-this-key-please-12345}
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      # 数据库配置（连接到上面的 mysql 服务）
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: ${DB_NAME:-ershou}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root123}
      DB_HOST: mysql
      DB_PORT: "3306"
      # 邮箱配置
      EMAIL_HOST: ${EMAIL_HOST:-smtp.qq.com}
      EMAIL_PORT: "587"
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-your-email@qq.com}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-your-auth-code}
      DEFAULT_FROM_EMAIL: ${EMAIL_HOST_USER:-your-email@qq.com}
      TZ: Asia/Shanghai
    volumes:
      - ./ershou/media:/app/media
      - ./ershou/ershou/settings.py:/app/ershou/settings.py:ro
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # ============================================
  # Nginx + Vue 前端服务
  # ============================================
  frontend:
    build:
      context: ./ershou/Vue
      dockerfile: Dockerfile
    container_name: campus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

# ============================================
# 数据卷：持久化数据库数据
# ============================================
volumes:
  mysql_data:

# ============================================
# 网络：容器间通信
# ============================================
networks:
  app-network:
    driver: bridge
